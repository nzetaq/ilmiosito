<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <defs>
    <radialGradient id="faceGrad" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#121b2a"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="caseGrad" cx="30%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#dfc080"/>
      <stop offset="48%" stop-color="#b88c45"/>
      <stop offset="100%" stop-color="#7a5520"/>
    </radialGradient>
    <radialGradient id="crownGrad" cx="28%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#ead398"/>
      <stop offset="100%" stop-color="#c09040"/>
    </radialGradient>
    <filter id="caseShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="7" flood-color="rgba(0,0,0,0.75)"/>
    </filter>
    <filter id="handGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Anello della catena ── -->
  <ellipse cx="100" cy="19" rx="12" ry="8"
    fill="none" stroke="url(#crownGrad)" stroke-width="3"/>
  <ellipse cx="100" cy="19" rx="12" ry="8"
    fill="none" stroke="rgba(255,215,120,0.2)" stroke-width="1"/>

  <!-- ── Corona (stelo di carica) ── -->
  <!-- Parte zigrinata superiore -->
  <rect x="91" y="11" width="18" height="9" rx="2.5" fill="url(#crownGrad)"/>
  <line x1="94.5" y1="11" x2="94.5" y2="20" stroke="rgba(60,30,0,0.3)" stroke-width="1"/>
  <line x1="97.5" y1="11" x2="97.5" y2="20" stroke="rgba(60,30,0,0.3)" stroke-width="1"/>
  <line x1="100.5" y1="11" x2="100.5" y2="20" stroke="rgba(60,30,0,0.3)" stroke-width="1"/>
  <line x1="103.5" y1="11" x2="103.5" y2="20" stroke="rgba(60,30,0,0.3)" stroke-width="1"/>
  <line x1="106.5" y1="11" x2="106.5" y2="20" stroke="rgba(60,30,0,0.3)" stroke-width="1"/>
  <!-- Corpo stelo -->
  <rect x="87" y="19" width="26" height="21" rx="3.5" fill="url(#caseGrad)"/>
  <!-- Luce sulla corona -->
  <rect x="88.5" y="20.5" width="9" height="18" rx="2"
    fill="rgba(255,215,100,0.1)"/>

  <!-- ── Cassa (bezzel esterno) ── -->
  <!-- Ombra sotto -->
  <circle cx="102" cy="153" r="88" fill="rgba(0,0,0,0.45)" filter="url(#caseShadow)"/>
  <!-- Cassa principale -->
  <circle cx="100" cy="150" r="88" fill="url(#caseGrad)"/>
  <!-- Riflesso alto-sinistra -->
  <path d="M 42 103 A 70 70 0 0 1 103 42"
    fill="none" stroke="rgba(255,220,130,0.22)" stroke-width="7" stroke-linecap="round"/>
  <!-- Bordo rimante -->
  <circle cx="100" cy="150" r="88"
    fill="none" stroke="rgba(255,210,90,0.28)" stroke-width="1.5"/>

  <!-- ── Bevel interno ── -->
  <circle cx="100" cy="150" r="81" fill="rgba(0,0,0,0.22)"/>
  <circle cx="100" cy="150" r="81"
    fill="none" stroke="rgba(210,165,65,0.3)" stroke-width="0.8"/>

  <!-- ── Quadrante ── -->
  <circle cx="100" cy="150" r="76" fill="url(#faceGrad)"/>

  <!-- Riflesso del cristallo -->
  <ellipse cx="76" cy="118" rx="32" ry="20"
    fill="rgba(255,255,255,0.022)" transform="rotate(-28,76,118)"/>

  <!-- ── Anelli decorativi interni ── -->
  <circle cx="100" cy="150" r="70"
    fill="none" stroke="rgba(200,165,90,0.18)" stroke-width="0.8"/>

  <!-- ── Indici ore ── -->
  <!-- Maggiori: 12, 3, 6, 9  (r_out=73, r_in=62) -->
  <line x1="100" y1="77"  x2="100" y2="88"  stroke="#c8a760" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="162" y1="150" x2="173" y2="150" stroke="#c8a760" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="100" y1="212" x2="100" y2="223" stroke="#c8a760" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="27"  y1="150" x2="38"  y2="150" stroke="#c8a760" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Minori (r_out=71, r_in=66) -->
  <!-- 1: sin30=0.5   cos30=0.866 → in(133,92.8)  out(135.5,88.5) -->
  <line x1="133"   y1="92.8"  x2="135.5" y2="88.5"  stroke="#c8a760" stroke-width="2" stroke-linecap="round"/>
  <!-- 2: sin60=0.866 cos60=0.5  → in(157.2,117)  out(161.5,114.5) -->
  <line x1="157.2" y1="117"   x2="161.5" y2="114.5" stroke="#c8a760" stroke-width="2" stroke-linecap="round"/>
  <!-- 4: sin120=0.866 cos120=-0.5 → in(157.2,183) out(161.5,185.5) -->
  <line x1="157.2" y1="183"   x2="161.5" y2="185.5" stroke="#c8a760" stroke-width="2" stroke-linecap="round"/>
  <!-- 5: sin150=0.5  cos150=-0.866 → in(133,207.2) out(135.5,211.5) -->
  <line x1="133"   y1="207.2" x2="135.5" y2="211.5" stroke="#c8a760" stroke-width="2" stroke-linecap="round"/>
  <!-- 7: sin210=-0.5 cos210=-0.866 → in(67,207.2) out(64.5,211.5) -->
  <line x1="67"    y1="207.2" x2="64.5"  y2="211.5" stroke="#c8a760" stroke-width="2" stroke-linecap="round"/>
  <!-- 8: sin240=-0.866 cos240=-0.5 → in(42.8,183) out(38.5,185.5) -->
  <line x1="42.8"  y1="183"   x2="38.5"  y2="185.5" stroke="#c8a760" stroke-width="2" stroke-linecap="round"/>
  <!-- 10: sin300=-0.866 cos300=0.5 → in(42.8,117) out(38.5,114.5) -->
  <line x1="42.8"  y1="117"   x2="38.5"  y2="114.5" stroke="#c8a760" stroke-width="2" stroke-linecap="round"/>
  <!-- 11: sin330=-0.5 cos330=0.866 → in(67,92.8) out(64.5,88.5) -->
  <line x1="67"    y1="92.8"  x2="64.5"  y2="88.5"  stroke="#c8a760" stroke-width="2" stroke-linecap="round"/>

  <!-- ── Lancette (ore 10:10) ── -->
  <!--
    Ora (305°): sin=-0.819 cos=0.574
      punta r=40: (67.2, 127)
      coda r=12:  (109.8, 156.9)
      perp: (0.574, 0.819) → normale w=3.2
      sinistra punta: (67.2+0, 127+0)  ≈ punta affilata
      sinistra coda:  (109.8-3.2*0.574, 156.9+3.2*0.819) = (107.96, 159.52)
      destra coda:    (109.8+3.2*0.574, 156.9-3.2*0.819) = (111.64, 154.28)
  -->
  <polygon
    points="67.2,127 107.96,159.52 111.64,154.28"
    fill="rgba(215,230,248,0.93)"
    filter="url(#handGlow)"/>

  <!--
    Minuti (60°): sin=0.866 cos=0.5
      punta r=58: (150.2, 121)
      coda r=14:  (87.9, 157)
      perp: (-0.5, 0.866) → w=2.2
      sinistra coda: (87.9+2.2*(-0.5), 157+2.2*0.866) = (86.8, 158.9)
      destra coda:   (87.9-2.2*(-0.5), 157-2.2*0.866) = (89.0, 155.1)
  -->
  <polygon
    points="150.2,121 86.8,158.9 89.0,155.1"
    fill="rgba(215,230,248,0.93)"
    filter="url(#handGlow)"/>

  <!-- Lancetta dei secondi (~25s = 150°) -->
  <!-- sin150=0.5 cos150=-0.866 → punta: (128,198.5)  coda: (92,136.1) -->
  <line x1="92" y1="136.1" x2="128" y2="198.5"
    stroke="rgba(195,80,60,0.88)" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Contrappeso (coda spessa) -->
  <line x1="100" y1="150" x2="92" y2="136.1"
    stroke="rgba(195,80,60,0.88)" stroke-width="2.8" stroke-linecap="round"/>

  <!-- ── Perno centrale ── -->
  <circle cx="100" cy="150" r="5.5" fill="url(#crownGrad)"/>
  <circle cx="100" cy="150" r="3"   fill="#050810"/>
  <circle cx="98.5" cy="148.5" r="1" fill="rgba(255,215,120,0.65)"/>

  <!-- ── Alone aurora (coerenza col sito) ── -->
  <circle cx="100" cy="150" r="76"
    fill="none" stroke="rgba(100,220,180,0.055)" stroke-width="10"/>
</svg>
